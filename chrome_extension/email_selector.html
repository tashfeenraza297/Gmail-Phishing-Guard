<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Select Emails to Scan - PhishGuard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      min-height: 100vh;
    }
    
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }
    
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 24px;
      text-align: center;
    }
    
    .header h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }
    
    .header p {
      opacity: 0.9;
      font-size: 14px;
    }
    
    .controls {
      padding: 20px 24px;
      background: #f9fafb;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    
    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .btn-secondary {
      background: white;
      border: 2px solid #e5e7eb;
      color: #374151;
    }
    
    .btn-secondary:hover {
      background: #f3f4f6;
    }
    
    .email-list {
      max-height: 500px;
      overflow-y: auto;
      padding: 16px 24px;
    }
    
    .email-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .email-item:hover {
      border-color: #667eea;
      background: #f9fafb;
    }
    
    .email-item.selected {
      border-color: #667eea;
      background: #ede9fe;
    }
    
    .checkbox {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }
    
    .email-info {
      flex: 1;
    }
    
    .email-subject {
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 4px;
    }
    
    .email-from {
      font-size: 13px;
      color: #6b7280;
    }
    
    .email-date {
      font-size: 13px;
      color: #9ca3af;
      white-space: nowrap;
    }
    
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #6b7280;
    }
    
    .loading-spinner {
      border: 3px solid #e5e7eb;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .selected-count {
      flex: 1;
      color: #6b7280;
      font-size: 14px;
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #6b7280;
    }
    
    .empty-state svg {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      opacity: 0.3;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🛡️ Select Emails to Scan</h1>
      <p>Choose old emails to analyze for phishing threats</p>
    </div>
    
    <div class="controls">
      <span class="selected-count" id="selectedCount">0 emails selected</span>
      <button class="btn btn-secondary" id="selectAllBtn">Select All</button>
      <button class="btn btn-primary" id="scanSelectedBtn" disabled>Scan Selected</button>
    </div>
    
    <div class="email-list" id="emailList">
      <div class="loading">
        <div class="loading-spinner"></div>
        <p>Loading emails from your inbox...</p>
      </div>
    </div>
  </div>
  
  <script src="email_selector.js"></script>
</body>
</html>
