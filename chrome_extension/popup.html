<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhishGuard</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-content">
      <div class="logo">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <h1>PhishGuard</h1>
      </div>
      <button class="settings-btn" id="settingsBtn" title="Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
          <path d="M12 1v6m0 6v6m6-6h6m-6 0H1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Stats Dashboard -->
  <div class="stats-container">
    <div class="stat-card stat-primary">
      <div class="stat-icon">📊</div>
      <div class="stat-info">
        <span class="stat-label">Scans Today</span>
        <span class="stat-value" id="scansToday">0</span>
        <span class="stat-limit">/ <span id="dailyLimit">50</span></span>
      </div>
    </div>
    
    <div class="stat-card stat-success">
      <div class="stat-icon">✅</div>
      <div class="stat-info">
        <span class="stat-label">Safe Emails</span>
        <span class="stat-value" id="safeCount">0</span>
      </div>
    </div>
    
    <div class="stat-card stat-danger">
      <div class="stat-icon">🚨</div>
      <div class="stat-info">
        <span class="stat-label">Threats Blocked</span>
        <span class="stat-value" id="threatsCount">0</span>
      </div>
    </div>
  </div>

  <!-- Status Card -->
  <div class="status-card">
    <div class="status-indicator" id="statusIndicator">
      <div class="pulse"></div>
      <span class="status-dot"></span>
    </div>
    <div class="status-info">
      <h3 id="statusText">Monitoring Active</h3>
      <p id="statusDetail">Next scan in 5 minutes</p>
    </div>
    <button class="toggle-monitoring-btn" id="toggleMonitoringBtn">
      <svg class="icon-stop" width="16" height="16" viewBox="0 0 24 24" fill="none">
        <rect x="6" y="6" width="12" height="12" fill="currentColor" rx="2"/>
      </svg>
      <svg class="icon-play" width="16" height="16" viewBox="0 0 24 24" fill="none" style="display:none;">
        <path d="M8 5v14l11-7z" fill="currentColor"/>
      </svg>
      <span class="btn-text">Stop</span>
    </button>
  </div>

  <!-- Quick Actions -->
  <div class="actions-section">
    <h2>Quick Actions</h2>
    
    <button class="action-btn action-primary" id="scanNowBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M21.5 12.5l-8-8-8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M13.5 4.5v13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span>Scan New Emails Now</span>
    </button>
    
    <button class="action-btn action-secondary" id="manualScanBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="2"/>
        <path d="M3 9h18" stroke="currentColor" stroke-width="2"/>
      </svg>
      <span>Select & Scan Old Emails</span>
    </button>
  </div>

  <!-- Recent Scans -->
  <div class="recent-section">
    <div class="section-header">
      <h2>Recent Scans</h2>
      <button class="view-all-btn" id="viewAllBtn">View All</button>
    </div>
    
    <div id="recentScans" class="recent-list">
      <!-- Dynamically populated -->
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <p>No scans yet</p>
        <span>Click "Scan Now" to get started</span>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="footer-text">Protected by AI • Last update: <span id="lastUpdate">Just now</span></span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
